services:
  tid:
    container_name: tid
    build:
      context: .
      dockerfile: Dockerfile.deploy
    restart: unless-stopped
    ports:
      - "8000:80"
    environment:
      - GO_API_PORT=8080
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-http://localhost:8000}
      - SITE_NAME=${SITE_NAME:-The Idea Guy}
      - SITE_TAGLINE=${SITE_TAGLINE:-Testing what's real in AI — one person, real loops, no hype.}
    volumes:
      - ./data:/data