<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; base-uri 'none'; object-src 'none'; script-src 'sha256-kq1DsKspItEm+NHQIMeeBvsiTTzraVXUtk6FK8GjXIQ='; style-src 'sha256-tx8CFpTKGdN2cJLTc2FQAnfW0gRurrB/KlptnCkRnhI='; img-src 'none'; font-src 'none'; connect-src 'none'; form-action 'none'">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Roomworks shared counter</title>
  <style>
:root {
  color-scheme: dark;
  font-family: Georgia, serif;
  background: #141713;
  color: #f0ecdf;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 24px;
}

main {
  width: min(420px, 100%);
  padding: 42px;
  border: 1px solid #4c5248;
  background: #1b1f1a;
  box-shadow: 12px 12px 0 #090b09;
}

.eyebrow {
  color: #a4c48c;
  font: 700 11px/1 monospace;
  letter-spacing: 0;
  text-transform: uppercase;
}

h1 {
  margin: 12px 0 30px;
  font-size: 42px;
  font-weight: 400;
  line-height: 1;
  overflow-wrap: anywhere;
}

output {
  display: block;
  color: #f2b65d;
  font: 700 86px/1 monospace;
  letter-spacing: 0;
  margin-bottom: 24px;
  overflow-wrap: anywhere;
}

button {
  width: 100%;
  border: 0;
  padding: 15px 20px;
  background: #e7e1d2;
  color: #161915;
  font: 700 14px/1 monospace;
  cursor: pointer;
}

button:active {
  transform: translate(2px, 2px);
}

button:disabled {
  cursor: not-allowed;
  opacity: 0.5;
}

.status {
  min-height: 18px;
  margin-top: 14px;
  color: #858c80;
  font: 11px/1.4 monospace;
}

@media (max-width: 480px) {
  body {
    padding: 16px;
  }

  main {
    padding: 28px;
  }

  h1 {
    font-size: 32px;
  }

  output {
    font-size: 64px;
  }
}
  </style>
</head>
<body>
  <main>
    <div class="eyebrow">Shared instrument</div>
    <h1 id="title">Shared counter</h1>
    <output id="count">-</output>
    <button id="increment" type="button">Add one</button>
    <div id="status" class="status">Connecting to the room bridge...</div>
  </main>
  <script>
(() => {
  const CHANNEL = 'meta-room'
  const parameters = new URLSearchParams(window.location.hash.slice(1))
  const nonce = parameters.get('nonce') ?? ''
  const title = parameters.get('title') ?? ''
  const pending = new Map()
  let sequence = 0
  const count = document.getElementById('count')
  const heading = document.getElementById('title')
  const increment = document.getElementById('increment')
  const status = document.getElementById('status')

  if (!/^[A-Za-z0-9_-]{24}$/.test(nonce) || title.length < 1 || title.length > 80) {
    increment.disabled = true
    status.textContent = 'Room application unavailable'
    return
  }

  document.title = `${title} - Roomworks`
  heading.textContent = title

  function call(method, payload, timeoutMs = 5000) {
    const requestId = `request-${++sequence}`
    return new Promise((resolve, reject) => {
      const timeout = window.setTimeout(() => {
        if (pending.delete(requestId)) reject(new Error('Bridge timeout'))
      }, timeoutMs)
      pending.set(requestId, { resolve, reject, timeout })
      parent.postMessage({
        channel: CHANNEL,
        version: 1,
        nonce,
        type: 'bridge.request',
        requestId,
        method,
        payload,
      }, '*')
    })
  }

  function render(state) {
    if (!state || !Number.isSafeInteger(state.value) || state.value < 0) return
    count.textContent = String(state.value)
    status.textContent = 'Saved locally - ready to sync'
  }

  window.addEventListener('message', (event) => {
    if (event.source !== parent) return
    const message = event.data
    if (
      !message
      || message.channel !== CHANNEL
      || message.version !== 1
      || message.nonce !== nonce
    ) return
    if (message.type === 'bridge.state') render(message.state)
    if (message.type === 'bridge.response' && pending.has(message.requestId)) {
      const request = pending.get(message.requestId)
      pending.delete(message.requestId)
      window.clearTimeout(request.timeout)
      if (message.ok) {
        render(message.state)
        request.resolve(message.state)
      } else {
        request.reject(new Error(message.error || 'Bridge update failed'))
      }
    }
  })

  increment.addEventListener('click', async () => {
    status.textContent = 'Saving...'
    try {
      await call('update', { type: 'counter.increment' })
    } catch {
      status.textContent = 'Update failed - try again'
    }
  })

  async function connectBridge() {
    for (let attempt = 0; attempt < 8; attempt += 1) {
      try {
        await call('subscribe', undefined, 1000)
        return
      } catch {
        await new Promise((resolve) => window.setTimeout(resolve, 150))
      }
    }
    status.textContent = 'Room bridge unavailable'
  }

  void connectBridge()
})()
  </script>
</body>
</html>
