server_tokens off;
access_log off;
error_log /dev/stderr warn;
client_max_body_size 320k;

map $uri $roomworks_cache_control {
  default "";
  /sw.js "no-store, no-cache, must-revalidate";
  /sw-v2.js "no-store, no-cache, must-revalidate";
}

map $http_x_forwarded_proto $roomworks_hsts {
  default "";
  https "max-age=31536000";
}

server {
  listen 80 default_server;
  server_name rooms.the-idea-guy.com localhost;

  if ($http_x_forwarded_proto = "http") {
    return 308 https://$host$request_uri;
  }

  root /usr/share/nginx/html;
  index index.html;

  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header X-Frame-Options "DENY" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
  add_header Strict-Transport-Security $roomworks_hsts always;
  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://rooms-api.the-idea-guy.com; frame-src 'self'; worker-src 'self'; manifest-src 'self'; form-action 'self'; upgrade-insecure-requests" always;
  add_header Cache-Control $roomworks_cache_control always;

  location = /up {
    default_type text/plain;
    return 200 "ok";
  }

  location /api/ {
    proxy_pass http://127.0.0.1:8081/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_connect_timeout 5s;
    proxy_read_timeout 35s;
    proxy_send_timeout 35s;
  }

  location /assets/ {
    expires 1y;
    try_files $uri =404;
  }

  location = /index.html {
    expires -1;
  }

  location = /room-frame.html {
    try_files $uri =404;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
    add_header Strict-Transport-Security $roomworks_hsts always;
    add_header Content-Security-Policy "default-src 'none'; base-uri 'none'; object-src 'none'; frame-ancestors 'self'; sandbox allow-scripts; script-src 'sha256-kq1DsKspItEm+NHQIMeeBvsiTTzraVXUtk6FK8GjXIQ='; style-src 'sha256-tx8CFpTKGdN2cJLTc2FQAnfW0gRurrB/KlptnCkRnhI='; img-src 'none'; font-src 'none'; connect-src 'none'; form-action 'none'" always;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  location = /sw.js {
    expires off;
  }

  location = /sw-v2.js {
    expires off;
  }

  location = /admin { return 404; }
  location = /dev { return 404; }
  location ^~ /dev/ { return 404; }
  location = /register { return 404; }
  location = /get { return 404; }
  location = /room { return 404; }
  location ^~ /room/ { return 404; }

  location / {
    try_files $uri $uri/ /index.html;
  }
}

server {
  listen 80;
  server_name rooms-api.the-idea-guy.com;

  if ($http_x_forwarded_proto = "http") {
    return 308 https://$host$request_uri;
  }

  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header X-Frame-Options "DENY" always;
  add_header Strict-Transport-Security $roomworks_hsts always;

  location / {
    proxy_pass http://127.0.0.1:8081;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_connect_timeout 5s;
    proxy_read_timeout 35s;
    proxy_send_timeout 35s;
  }
}
